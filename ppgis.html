<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Participatory GIS Platform</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css?v=20260604-mapheight1">
  <link rel="stylesheet" href="css/ppgis.css?v=20260604-sessionform1">
</head>
<body class="ppgis-map-page">
  <header class="site-header">
    <nav class="nav-bar app-nav nav-logo-layout" aria-label="Primary navigation">
      <div class="nav-spacer" aria-hidden="true"></div>
      <a class="brand nav-logo-link" href="index.html" aria-label="Seeing School Differently home">
        <img class="nav-logo" src="img/logo.png" alt="The Spatial Log">
      </a>
      <div class="nav-auth" id="navAuth" aria-live="polite"></div>
    </nav>
  </header>

  <main class="ppgis-popup-shell">
    <button class="ppgis-locate-fab" id="ppgisLocate" type="button" aria-label="Use my location" title="Use my location">
      <span aria-hidden="true">◎</span>
    </button>

    <section class="ppgis-welcome-modal" id="ppgisWelcomeModal" aria-label="Participatory GIS instructions" aria-modal="true" role="dialog" hidden>
      <button class="ppgis-welcome-close" id="ppgisWelcomeClose" type="button" aria-label="Close">&times;</button>
      <p class="eyebrow">Participatory GIS</p>
      <h1>Share a Place-Based Story</h1>
      <p>
        Click the map to place a marker. Signed-in users can submit a title,
        story, and anonymity choice. Visitors who are not signed in can view
        approved public submissions.
      </p>
      <div class="ppgis-welcome-actions">
        <button id="ppgisWelcomeDontShow" type="button">Do not show for 24 hours</button>
        <button id="ppgisWelcomeOk" type="button">Close</button>
      </div>
      <p id="ppgisLocationStatus" class="ppgis-location-status" aria-live="polite"></p>
    </section>

    <aside id="ppgisPopover" class="ppgis-popover" aria-live="polite"></aside>

    <section class="ppgis-full-map" aria-label="Participatory GIS map">
      <div id="ppgisPopupMap"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  <script src="js/ppgis.js?v=20260604-sessionform1"></script>
</body>
</html>
